<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f3f1ec" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,500;1,600&family=Instrument+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
  />
  <script>
    (() => {
      try {
        var storedTheme = localStorage.getItem("theme");
        var preferredDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        var isDark = storedTheme ? storedTheme === "dark" : preferredDark;
        document.documentElement.classList.toggle("dark", isDark);
      } catch (_) {}
    })();
  </script>
  <title>Muskan Wagh | Portfolio</title>
  <meta name="description" content="Portfolio of Muskan Wagh - Full Stack Developer & Aspiring Software Engineer" />

  <meta property="og:description" content="Full-stack developer portfolio featuring projects, experience, and certifications." />
  <meta property="og:image" content="/og-image.jpg" />
  <meta property="og:site_name" content="Muskan Wagh Portfolio" />
  <meta name="twitter:card" content="summary_large_image" />
